<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa AI | فيكسا الجدع</title>
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --accent: #ffffff;
            --text: #ffffff;
            --gray: #888888;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%; max-width: 600px;
            display: flex; flex-direction: column;
            border-left: 1px solid #222; border-right: 1px solid #222;
            height: 100vh;
        }

        header {
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #222;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
        }

        .logo-area { display: flex; align-items: center; gap: 10px; font-weight: bold; letter-spacing: 2px; font-size: 1.2rem; }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.6; font-size: 16px; word-wrap: break-word; }
        .vixa { align-self: flex-start; background: transparent; border: 1px solid #333; color: #eee; border-bottom-right-radius: 4px; }
        .user { align-self: flex-end; background: #222; color: #fff; border-bottom-left-radius: 4px; }
        
        .img-preview { max-width: 100%; border-radius: 10px; margin-top: 10px; display: block; border: 1px solid #444; }

        footer { padding: 20px; background: var(--bg); }
        .input-capsule {
            background: #181818; display: flex; align-items: center;
            padding: 8px 12px; border-radius: 30px; gap: 10px; border: 1px solid #333;
        }

        input[type="text"] {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; font-size: 16px; padding: 5px;
        }

        button { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        button:hover { opacity: 0.6; }
        .send-btn { background: #fff; width: 35px; height: 35px; border-radius: 50%; }
        .send-btn svg { fill: #000; }

        #image-input { display: none; }
        .typing { font-size: 12px; color: var(--gray); padding: 5px 25px; display: none; }
        
        /* شاشة الترحيب أول مرة */
        #welcome-overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; gap: 20px;
        }
    </style>
</head>
<body>

<div id="welcome-overlay" style="display: none;">
    <svg width="80" height="80" viewBox="0 0 100 100"><path d="M20 20L50 85L80 20" stroke="white" stroke-width="8" fill="none"/></svg>
    <h1>أهلاً بيك في VEXA</h1>
    <p>قولي اسمك إيه يا بطل عشان فيكسا يعرف يندهلك؟</p>
    <input type="text" id="name-input" placeholder="اكتب اسمك هنا..." style="background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; color: white; width: 250px; text-align: center;">
    <button id="start-btn" style="background: white; color: black; padding: 10px 30px; border-radius: 25px; font-weight: bold;">ابدأ الشات</button>
</div>

<div class="app-container">
    <header>
        <div class="logo-area">
            <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 20L50 85L80 20" stroke="white" stroke-width="10" stroke-linecap="round"/>
                <path d="M20 85L80 20" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
                <path d="M80 85L20 20" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
            </svg>
            <span>VEXA AI</span>
        </div>
        <button id="clear-btn" title="مسح المحادثة">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
    </header>

    <main id="chat-window"></main>

    <div id="typing-indicator" class="typing">فيكسا بيفكر...</div>

    <footer>
        <div class="input-capsule">
            <label for="image-input" style="cursor: pointer;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </label>
            <input type="file" id="image-input" accept="image/*">
            <input type="text" id="user-input" placeholder="اسأل فيكسا أي حاجة..." autocomplete="off">
            <button class="send-btn" id="send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </footer>
</div>

<script type="module">
    const API_KEY = "AIzaSyD7DJcm6QuBHsbbbv0IgemzAyYsw9BUxCw";
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const imageInput = document.getElementById('image-input');
    const typingIndicator = document.getElementById('typing-indicator');

    // ذاكرة المحادثة
    let chatHistory = JSON.parse(localStorage.getItem('vixa_history')) || [];

    // التعامل مع المستخدم الجديد
    if (!localStorage.getItem('vixa_user')) {
        document.getElementById('welcome-overlay').style.display = 'flex';
    } else {
        startChat();
    }

    document.getElementById('start-btn').onclick = () => {
        const name = document.getElementById('name-input').value.trim();
        if(name) {
            localStorage.setItem('vixa_user', name);
            document.getElementById('welcome-overlay').style.display = 'none';
            startChat();
        }
    };

    function startChat() {
        const user = localStorage.getItem('vixa_user');
        if (chatHistory.length === 0) {
            addMessage(`أهلاً يا ${user}! أنا فيكسا الجدع، منور الدنيا.. أؤمرني يا بطل محتاج إيه؟`, 'vixa');
        } else {
            chatHistory.forEach(msg => {
                if (msg.role !== 'system') addMessage(msg.parts[0].text, msg.role === 'user' ? 'user' : 'vixa');
            });
        }
    }

    function addMessage(text, role, imgSrc = null) {
        const div = document.createElement('div');
        div.classList.add('msg', role);
        div.innerText = text;
        if(imgSrc) {
            const img = document.createElement('img');
            img.src = imgSrc;
            img.classList.add('img-preview');
            div.prepend(img);
        }
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });
    }

    async function askVixa() {
        const text = userInput.value.trim();
        const file = imageInput.files[0];
        if (!text && !file) return;

        let userMsg = text;
        let base64Img = null;
        let displayImg = null;

        if (file) {
            base64Img = await fileToBase64(file);
            displayImg = URL.createObjectURL(file);
        }

        addMessage(userMsg || "شوف الصورة دي يا فيكسا", 'user', displayImg);
        userInput.value = '';
        imageInput.value = '';
        typingIndicator.style.display = 'block';

        const payload = {
            contents: [{
                role: "user",
                parts: [
                    { text: `أنت فيكسا الجدع، مساعد مصري ذكي من شركة Vexa. رده بلهجة مصرية صايعة وجدعة. السؤال: ${text}` },
                    ...(base64Img ? [{ inline_data: { mime_type: file.type, data: base64Img } }] : [])
                ]
            }]
        };

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            addMessage(reply, 'vixa');
            
            // حفظ في الذاكرة
            chatHistory.push({ role: 'user', parts: [{ text: userMsg }] });
            chatHistory.push({ role: 'model', parts: [{ text: reply }] });
            localStorage.setItem('vixa_history', JSON.stringify(chatHistory.slice(-20))); // حفظ آخر 20 رسالة
        } catch (e) {
            addMessage("حصل دروب يا ريس، جرب تاني كدة..", 'vixa');
        } finally {
            typingIndicator.style.display = 'none';
        }
    }

    sendBtn.onclick = askVixa;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') askVixa(); };
    document.getElementById('clear-btn').onclick = () => {
        localStorage.removeItem('vixa_history');
        location.reload();
    };
</script>
</body>
</html>
